name: Xfce-Testing
on:
  workflow_dispatch:

env:
  STACK_SLUG: testing-nvidia-stack
  VERSION_SUFFIX: Respin
  ISO_PROFILES_BRANCH: xfce

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - id: time
        uses: nanzm/get-time-action@v2.0
        with:
          format: 'YYYYMMDDHHmm'
    outputs:
      release_tag: ${{ steps.time.outputs.time }}

  build-release:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    timeout-minutes: 120
    strategy:
      matrix:
        EDITION: [xfce]
        BRANCH: [testing]
        SCOPE: [full]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
        
      - id: time
        uses: nanzm/get-time-action@v2.0
        with:
          format: 'YYYY-MM'

      - name: image-build-upload
        uses: megvadulthangya/manjaro-iso-action@awesome
        with:
          iso-profiles-repo: 'https://github.com/megvadulthangya/iso-profiles'
          iso-profiles-branch: ${{ env.ISO_PROFILES_BRANCH }}
          build-mirror: https://mirror.fcix.net/manjaro/
          additional-trusted-gpg: 'A9A569C8F797B6878E44C4F8FBF4AB57E9BB9D3C 73580DE2EDDFA6D6'
          edition: ${{ matrix.edition }}
          branch: ${{ matrix.branch }}
          scope: ${{ matrix.scope }}
          version: ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}
          kernel: linux71
          code-name: "Nordic"

      - name: Generate README & Upload to SourceForge
        if: success()
        env:
          SF_USER: ${{ secrets.SF_USERNAME }}
          SF_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_PROJECT: "manjaro-xfce-respin"
          SF_DIR: "Releases/${{ env.STACK_SLUG }}/${{ needs.prepare-release.outputs.release_tag }}/${{ matrix.scope }}"
        run: |
          if [ -z "$SF_USER" ]; then
            echo "HIBA: Az SF_USER változó üres!"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SF_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net shell.sourceforge.net web.sourceforge.net >> ~/.ssh/known_hosts

          ISO_FILE=$(find . -maxdepth 2 -name "*.iso" | head -n 1)
          SOURCE_DIR=$(dirname "$ISO_FILE")
          README_PATH="$SOURCE_DIR/README.md"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat <<EOF > "$README_PATH"
          # 🏔️ Manjaro XFCE Respin - Nordic Themed

          ![Maintenance Status](https://img.shields.io/badge/Maintenance-Actively%20maintained%20via%20automated%20CI%2FCD%20pipeline-brightgreen)

          ## 📦 Build Info
          - **Date:** $BUILD_DATE
          - **Version:** ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}
          - **Branch:** Manjaro TESTING
          - **Kernel:** linux71

          ---

          ## 🛠️ TESTING KIADÁS / TESTING RELEASE

          ### **🚀 NORMÁL NVIDIA VERZIÓ 🚀**
          ### **🚀 STANDARD NVIDIA VERSION 🚀**

          **Ez a verzió az NVIDIA kártyát használóknak készült, tartalmazza a szükséges zárt drivereket az optimális teljesítményhez,mindennapi használatra szánt alaprendszer.**

          **Mostantól a rendszer a Manjaro TESTING ágát használja a frissebb csomagok érdekében.**

          **This version is designed for NVIDIA card users and includes the necessary proprietary drivers for optimal performance, the standard base for daily use.**

          **From now on, the system tracks the Manjaro TESTING branch for more up-to-date packages.**

          ---

          ## ⚙️ Overview / Áttekintés

          This project is a **custom Manjaro Linux ISO** designed for a cohesive, visually harmonious, and ready-to-work environment. Now based on the **Manjaro Testing branch**.

          Ez a projekt egy **egyedi Manjaro Linux ISO**, amelyet egy egységes, vizuálisan harmonikus és munkára kész környezetnek terveztem. Mostantól a **Manjaro Testing ágra** épül.

          ---

          ## 🚀 Key Features / Főbb jellemzők

          ### 🖥️ Desktop Environment
          * **Desktop Environment:** XFCE 4.x
          * **Theme:** Unified **Nordic** color scheme.

          ### 🛠️ System Core
          * **Base:** Manjaro Testing
          * **Filesystem:** BTRFS + Timeshift (automata snapshotok).
          * **Shell:** Fish (root), Zsh/Bash (user).

          ---

          ## 📺 Video Walkthrough / Videós bemutató
          [![Manjaro XFCE Respin Showcase](https://img.youtube.com/vi/7Z-CN08_2U8/maxresdefault.jpg)](https://youtu.be/7Z-CN08_2U8)

          ---

          ## ☕ Support / Támogatás
          👉 [Buy me a coffee](https://buymeacoffee.com/rohambili)

          ---

          ## 🧠 Credits / Készítette
          * **Base:** [Manjaro Linux](https://manjaro.org/)
          * **Respin by:** [@megvadulthangya](https://github.com/megvadulthangya)

          ---

          ## 📜 Recent Changes (Git Log)
          EOF

          # --- 4. Git Log hozzáadása a végére ---
          git log -n 50 --pretty=format:"* %s (%h) - %ad" --date=short >> "$README_PATH" || echo "Git history not available." >> "$README_PATH"
            
          echo "" >> "$README_PATH"
          echo "README generálva: $README_PATH"

          BASE_REMOTE="/home/frs/project/$SF_PROJECT"
          REMOTE_TARGET="$BASE_REMOTE/$SF_DIR"

          cat > sftp_commands.txt <<SFTP
          -mkdir $BASE_REMOTE/Releases
          -mkdir $BASE_REMOTE/Releases/${{ env.STACK_SLUG }}
          -mkdir $BASE_REMOTE/Releases/${{ env.STACK_SLUG }}/${{ needs.prepare-release.outputs.release_tag }}
          -mkdir $REMOTE_TARGET
          SFTP

          sftp -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -b sftp_commands.txt $SF_USER@frs.sourceforge.net

          rsync -avP -e "ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519" \
            "$SOURCE_DIR"/*.iso "$SOURCE_DIR"/*.sha* "$README_PATH" \
            "$SF_USER@frs.sourceforge.net:$REMOTE_TARGET/"

      - name: Upload to Internet Archive
        if: success()
        continue-on-error: true
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          pip install internetarchive
          ISO_FILE=$(find . -maxdepth 2 -name "*.iso" | head -n 1)
          SOURCE_DIR=$(dirname "$ISO_FILE")
          IA_ID="manjaro-xfce-respin-${{ env.STACK_SLUG }}"
          ia upload "$IA_ID" \
            "$SOURCE_DIR"/*.iso \
            "$SOURCE_DIR"/*.sha* \
            "$SOURCE_DIR"/README.md \
            --title "Manjaro XFCE Respin - Nordic Themed" \
            --creator "megvadulthangya" \
            --date "${{ needs.prepare-release.outputs.release_tag }}" \
            --language "eng" \
            --description "Custom Manjaro Linux XFCE respin with a unified Nordic theme. Based on the Manjaro Testing branch. Includes NVIDIA proprietary drivers, BTRFS filesystem, Timeshift snapshots. Version: ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}" \
            --subject "Linux; Manjaro; XFCE; Nordic; Respin"

  prune-stack-history:
    name: List & keep only current + previous release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release]
    if: success()
    env:
      SF_USER: ${{ secrets.SF_USERNAME }}
      SF_KEY: ${{ secrets.SF_SSH_KEY }}
      SF_PROJECT: "manjaro-xfce-respin"
      STACK_SLUG: testing-nvidia-stack
    steps:
      - name: Prune old releases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SF_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net shell.sourceforge.net web.sourceforge.net >> ~/.ssh/known_hosts

          BASE_REMOTE="/home/frs/project/$SF_PROJECT"
          STACK_REMOTE="$BASE_REMOTE/Releases/$STACK_SLUG"

          sftp_run() {
            sftp -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -b "$1" "$SF_USER@frs.sourceforge.net"
          }

          sftp_ls_names() {
            local tmp_batch
            tmp_batch="$(mktemp)"
            printf 'ls -1 %s\n' "$1" > "$tmp_batch"
            sftp_run "$tmp_batch" 2>&1 | sed 's/^sftp> //' | grep -vE '^(Connected to |Fetching |Can.t |No such file|not found|Failure$)' | awk -F'/' 'NF{print $NF}' | sed '/^$/d' || true
            rm -f "$tmp_batch"
          }

          mapfile -t TAGS < <(sftp_ls_names "$STACK_REMOTE" | grep -E '^[0-9]{12}$' | sort)
          TAG_COUNT=${#TAGS[@]}

          if [ "$TAG_COUNT" -le 2 ]; then
            exit 0
          fi

          mapfile -t DELETE_TAGS < <(printf '%s\n' "${TAGS[@]}" | head -n -2)

          for old_tag in "${DELETE_TAGS[@]}"; do
            mapfile -t SCOPES < <(sftp_ls_names "$STACK_REMOTE/$old_tag" | sort)
            BATCH_DEL="$(mktemp)"
            for scope in "${SCOPES[@]}"; do
              mapfile -t FILES < <(sftp_ls_names "$STACK_REMOTE/$old_tag/$scope" || true)
              for f in "${FILES[@]}"; do
                printf '%s\n' "-rm $STACK_REMOTE/$old_tag/$scope/$f" >> "$BATCH_DEL"
              done
              printf '%s\n' "-rmdir $STACK_REMOTE/$old_tag/$scope" >> "$BATCH_DEL"
            done
            printf '%s\n' "-rmdir $STACK_REMOTE/$old_tag" >> "$BATCH_DEL"
            sftp_run "$BATCH_DEL" || true
            rm -f "$BATCH_DEL"
          done