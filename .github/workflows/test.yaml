name: Testing-NVIDIA-Stack
on:
  workflow_dispatch:

env:
  STACK_SLUG: testing-nvidia-stack
  VERSION_SUFFIX: Respin
  ISO_PROFILES_BRANCH: XLibre

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YYYYMMDDHHmm'
    outputs:
      release_tag: ${{ steps.time.outputs.time }}

  build-release:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    timeout-minutes: 120
    strategy:
      matrix:
        EDITION: [awesome]
        BRANCH: [testing]
        SCOPE: [full]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
        
      - id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YY.MM'

      - name: image-build-upload
        uses: megvadulthangya/manjaro-iso-action@awesome
        with:
          iso-profiles-repo: 'https://github.com/megvadulthangya/iso-profiles'
          iso-profiles-branch: ${{ env.ISO_PROFILES_BRANCH }}
          build-mirror: https://mirror.fcix.net/manjaro/
          additional-trusted-gpg: 'A9A569C8F797B6878E44C4F8FBF4AB57E9BB9D3C 73580DE2EDDFA6D6'
          edition: ${{ matrix.edition }}
          branch: ${{ matrix.branch }}
          scope: ${{ matrix.scope }}
          version: ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}
          kernel: linux618
          code-name: "Nordic"

      - name: Generate README & Upload to SourceForge
        if: success()
        env:
          SF_USER: ${{ secrets.SF_USERNAME }}
          SF_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_PROJECT: "manjaro-awesome-iso"
          SF_DIR: "Releases/${{ env.STACK_SLUG }}/${{ needs.prepare-release.outputs.release_tag }}/${{ matrix.scope }}"
        run: |
          if [ -z "$SF_USER" ]; then
            echo "HIBA: Az SF_USER változó üres!"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SF_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net shell.sourceforge.net web.sourceforge.net >> ~/.ssh/known_hosts

          ISO_FILE=$(find . -maxdepth 2 -name "*.iso" | head -n 1)
          SOURCE_DIR=$(dirname "$ISO_FILE")
            
          if [ -z "$ISO_FILE" ]; then
            echo "HIBA: Nem található ISO fájl!"
            exit 1
          fi

          README_PATH="$SOURCE_DIR/README.md"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            
          {
            echo "# 🏔️ Manjaro Awesome Respin - Nordic Themed"
            echo ""
            echo "![Maintenance Status](https://img.shields.io/badge/Maintenance-Actively%20maintained%20via%20automated%20CI%2FCD%20pipeline-brightgreen)"
            echo ""
            echo "## 📦 Build Info"
            echo "- **Date:** $BUILD_DATE"
            echo "- **Version:** ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}"
            echo "- **Kernel:** linux618"
            echo "- **Branch:** Manjaro Testing"
            echo ""
            echo "## 🔐 Checksums"
          } > "$README_PATH"

          for ext in sha1 sha256 sha512; do
            hash_file=$(find "$SOURCE_DIR" -maxdepth 1 -name "*.$ext" | head -n 1)
            if [ -f "$hash_file" ]; then
              LABEL=$(echo "$ext" | tr 'a-z' 'A-Z')
              HASH_CODE=$(awk '{print $1}' "$hash_file")
              echo "- **$LABEL:** \`$HASH_CODE\`" >> "$README_PATH"
            fi
          done

          cat <<EOF >> "$README_PATH"

---

## 🛠️ TESTING KIADÁS / TESTING RELEASE

### **🚀 NORMÁL NVIDIA VERZIÓ (NEM AI/ML) 🚀**
### **🚀 STANDARD NVIDIA VERSION (NON-AI/ML) 🚀**

**Ez a verzió az NVIDIA kártyát használóknak készült, tartalmazza a szükséges drivereket. Mostantól a Manjaro TESTING ágát használja a frissebb csomagok érdekében.**

**This version is designed for NVIDIA users and includes the necessary drivers. It now uses the Manjaro TESTING branch for more up-to-date packages.**

---

### 📥 Alternatív letöltések / Alternative downloads:

* **AI/ML munkához (teljes stack):** [ai-ml-stack](https://sourceforge.net/projects/manjaro-awesome-iso/files/Releases/ai-ml-stack/)
* **Intel/AMD vagy VM teszteléshez:** [lite-no-nvidia-stack](https://sourceforge.net/projects/manjaro-awesome-iso/files/Releases/lite-no-nvidia-stack/)

---

## ⚙️ Overview / Áttekintés

This project is a **custom Manjaro Linux ISO** designed for a cohesive, visually harmonious, and ready-to-work environment.

**New in this release:** The system now tracks the **Manjaro Testing branch**. Installation is seamless via Calamares—no post-install scripts required.

Ez a projekt egy **egyedi Manjaro Linux ISO**, amelyet egy egységes, vizuálisan harmonikus és munkára kész környezetnek terveztem.

**Újdonság:** A rendszer mostantól a **Manjaro Testing ágat** használja. A telepítés zökkenőmentes a Calamares segítségével—nincs szükség utólagos scriptekre.

---

## 🚀 Key Features / Főbb jellemzők

### 🖥️ Desktop Environment
* **Window Manager:** AwesomeWM 4.x (Github version)
* **Theme:** Unified **Nordic** color scheme.
* **Applets:** **Awesome-rofi** fork integration.

### 📸 Creative Suite (Photography)
* **Darktable:** Pre-populated database with Stefano Ferro's styles and t3mujinpack film emulations.

### 🛠️ System Core
* **Base:** Manjaro Testing (x86_64)
* **Filesystem:** BTRFS + Timeshift.
* **Shell:** Fish (root), Zsh/Bash (user).

### 🌐 Connectivity & Stability Fixes / Hálózati Stabilitás
Unlike standard Manjaro, this ISO **fixes the "Limited Connectivity" false positives** by using Cloudflare (`cp.cloudflare.com` and `1.1.1.1`) for status checks.

A standard Manjaróval ellentétben ez az ISO **javítja a téves "Korlátozott kapcsolat" hibaüzeneteket** a Cloudflare hálózatának használatával az ellenőrzések során.

