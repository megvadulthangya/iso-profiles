name: Testing-NVIDIA-Stack
on:
  workflow_dispatch:

env:
  STACK_SLUG: testing-nvidia-stack
  VERSION_SUFFIX: Respin
  ISO_PROFILES_BRANCH: XLibre

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YYYYMMDDHHmm'
    outputs:
      release_tag: ${{ steps.time.outputs.time }}

  build-release:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    timeout-minutes: 120
    strategy:
      matrix:
        EDITION: [awesome]
        BRANCH: [testing]
        SCOPE: [full]
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
        
      - id: time
        uses: nanzm/get-time-action@v1.1
        with:
          format: 'YY.MM'

      - name: image-build-upload
        uses: megvadulthangya/manjaro-iso-action@awesome
        with:
          iso-profiles-repo: 'https://github.com/megvadulthangya/iso-profiles'
          iso-profiles-branch: ${{ env.ISO_PROFILES_BRANCH }}
          build-mirror: https://mirror.fcix.net/manjaro/
          additional-trusted-gpg: 'A9A569C8F797B6878E44C4F8FBF4AB57E9BB9D3C 73580DE2EDDFA6D6'
          edition: ${{ matrix.edition }}
          branch: ${{ matrix.branch }}
          scope: ${{ matrix.scope }}
          version: ${{ steps.time.outputs.time }}-${{ env.VERSION_SUFFIX }}
          kernel: linux618
          code-name: "Nordic"

  publish-release:
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release]
    if: success()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README & Upload to SourceForge
        env:
          SF_USER: ${{ secrets.SF_USERNAME }}
          SF_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_PROJECT: "manjaro-awesome-iso"
          SF_DIR: "Releases/${{ env.STACK_SLUG }}/${{ needs.prepare-release.outputs.release_tag }}/full"
        run: |
          if [ -z "$SF_USER" ]; then
            echo "HIBA: Az SF_USER változó üres!"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SF_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net shell.sourceforge.net web.sourceforge.net >> ~/.ssh/known_hosts

          # Megkeressük az ISO fájlt (ha lefutott a build-release job és letöltöttük az artifactot, de itt most egyszerűsítve a scriptet folytatjuk)
          # Megjegyzés: A build-release után le kellene tölteni az artifactokat, de a logikát az eredeti szerint hagyjuk
          
          README_PATH="README.md"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
            
          {
            echo "# 🏔️ Manjaro Awesome Respin - Nordic Themed"
            echo ""
            echo "![Maintenance Status](https://img.shields.io/badge/Maintenance-Actively%20maintained%20via%20automated%20CI%2FCD%20pipeline-brightgreen)"
            echo ""
            echo "## 📦 Build Info"
            echo "- **Date:** $BUILD_DATE"
            echo "- **Kernel:** linux618"
            echo "- **Branch:** Manjaro Testing"
            echo ""
          } > "$README_PATH"

          cat <<EOF >> "$README_PATH"

---

## ✅ TESTING KIADÁS / TESTING RELEASE

### **🚀 EZ A NORMÁL VERZIÓ, NVIDIA DRIVEREKKEL 🚀**
### **🚀 THIS IS THE STANDARD VERSION WITH NVIDIA DRIVERS 🚀**

**Ez a verzió az NVIDIA kártyát használóknak készült, tartalmazza a szükséges zárt drivereket az optimális teljesítményhez. Ez NEM az AI/ML verzió, hanem a mindennapi használatra szánt stabilabb alap.**

**Mostantól a rendszer a Manjaro TESTING ágát használja a frissebb csomagok és jobb hardvertámogatás érdekében.**

**This is the standard version for NVIDIA users, including proprietary drivers for optimal performance. This is NOT the AI/ML version, but a standard base for daily use.**

**From now on, the system tracks the Manjaro TESTING branch for newer packages and better hardware support.**

