services:
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped

    environment:
      # Timezone used for scheduling and logs
      - TZ=Europe/Budapest

      # Run every day at 01:00
      # Cron format: MIN HOUR DAY MONTH WEEKDAY
      - WATCHTOWER_SCHEDULE=0 1 * * *

      # Remove old images after updating containers
      - WATCHTOWER_CLEANUP=true

      # Enable notifications via email
      - WATCHTOWER_NOTIFICATIONS=email

      # Sender email address (must match the SMTP account in most cases)
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=your_email@gmail.com

      # Recipient email address (can be the same or a different address)
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=your_email@gmail.com

      # SMTP server host
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp.gmail.com

      # SMTP port:
      # 587 = STARTTLS (recommended)
      # 465 = SSL (less commonly used here)
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587

      # SMTP username, usually the same as the sender email address
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=your_email@gmail.com

      # SMTP password
      # IMPORTANT: Do NOT use your normal Gmail password.
      # For Gmail, you must create an App Password:
      # 1. Open your Google Account
      # 2. Enable 2-Step Verification
      # 3. Open https://myaccount.google.com/apppasswords
      # 4. Select App: Mail
      # 5. Select Device: Other and name it "watchtower"
      # 6. Google will generate a 16-character password
      # 7. Remove spaces and paste it here
      # Example: abcd efgh ijkl mnop -> abcdefghijklmnop
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=your_app_password_here

      # Delay before sending the email notification, in seconds
      - WATCHTOWER_NOTIFICATION_EMAIL_DELAY=2

      # Optional tag added to the email subject
      #- WATCHTOWER_NOTIFICATION_EMAIL_SUBJECTTAG=[watchtower]

    volumes:
      # Required so Watchtower can communicate with Docker
      - /var/run/docker.sock:/var/run/docker.sock

networks: {}