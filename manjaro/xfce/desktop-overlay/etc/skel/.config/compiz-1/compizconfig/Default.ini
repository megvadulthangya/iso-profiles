[core]
s0_hsize = 4
s0_vsize = 1
s0_number_of_desktops = 4
s0_active_plugins = core;composite;opengl;decor;move;resize;place;cube;cubeaddon;rotate;animation;wobbly;fade;

[composite]

[opengl]
s0_texture_filter = 1

[cube]
s0_skydome = true
s0_active_opacity = 80.000000
s0_top_color = #2e3440ff
s0_bottom_color = #2e3440ff
s0_skydome_image = /usr/share/backgrounds/manjaro-wallpapers-18.0/manjaro-adapta-maia-1.jpg

[cubeaddon]
s0_mirror = true
s0_deformation = 0
s0_ground_color1 = #88c0d0
s0_ground_color2 = #2e3440


[animation]
s0_open_effects = animation:Zoom;
s0_close_effects = animation:Zoom;
s0_minimize_effects = animation:Magic Lamp;

[decor]
s0_command = /usr/bin/compiz-decorator
